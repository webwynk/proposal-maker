<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebWynk CRM - Admin Dashboard</title>
  <link rel="icon" href="assets/webwynk-logo.webp">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/webwynk-logo.webp" alt="WebWynk" class="sidebar-logo">
        <div class="sidebar-title" style="margin-top:8px;">CRM Dashboard</div>
      </div>
      <nav>
        <a href="admin.html" class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="admin-clients.html" class="nav-item" data-page="clients">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Clients
        </a>
      </nav>
      <div class="user-info">
        <div class="user-name" id="userName">Admin</div>
        <div class="user-role">Administrator</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Dashboard Page -->
      <div id="page-dashboard">
        <div class="page-header">
          <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Clients</div>
            <div class="stat-value" id="statClients">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Invoices</div>
            <div class="stat-value" id="statInvoices">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Projects</div>
            <div class="stat-value" id="statProjects">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending Revenue</div>
            <div class="stat-value" id="statRevenue">₹0</div>
          </div>
        </div>

        <div class="stats-grid" style="grid-template-columns: 1fr; margin-bottom: 24px;">
          <div class="card" style="margin-bottom: 0;">
            <h3 style="font-family:'Bricolage Grotesque',serif; margin-bottom:16px;">Project Status Breakdown</h3>
            <div style="height:250px; display:flex; justify-content:center;">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
        </div>

        <div class="card">
          <h3 style="font-family:'Bricolage Grotesque',serif; margin-bottom:16px;">Recent Invoices</h3>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Invoice #</th>
                  <th>Client</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="recentInvoicesTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      </main>
  </div>

  <script src="js/admin.js"></script>

</body>
</html>
