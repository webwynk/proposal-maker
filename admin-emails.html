<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebWynk CRM - Email Delivery Log</title>
  <link rel="icon" href="assets/webwynk-logo.webp">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .topbar-greeting { display: flex; flex-direction: column; gap: 4px; }
    .topbar-greeting h1 { font-family: 'Bricolage Grotesque', serif; font-size: 1.75rem; font-weight: 700; color: var(--title); margin: 0; }
    .topbar-date { font-size: 0.9rem; color: var(--body); }
    .status-sent { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/webwynk-logo.webp" alt="WebWynk" class="sidebar-logo">
        <div class="sidebar-brand"><div class="sidebar-subtitle">CRM Dashboard</div></div>
      </div>
      <div class="nav-section-label">Main</div>
      <nav>
        <a href="admin.html" class="nav-item" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="admin-clients.html" class="nav-item" data-page="clients">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Clients</span>
        </a>
        <a href="admin-emails.html" class="nav-item active" data-page="emails">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>Email Log</span>
        </a>
      </nav>
      <div class="user-info">
        <div class="user-info-card">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="user-name" id="userName">Admin</div>
            <div class="user-role">Administrator</div>
          </div>
          <button class="logout-btn" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Out
          </button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div id="page-emails">
        <div class="page-header">
          <div class="topbar-greeting">
            <h1>Email Delivery Log</h1>
            <div class="topbar-date">Track all automated communications</div>
          </div>
        </div>

        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Recipient</th>
                  <th>Subject</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th>Sent At</th>
                </tr>
              </thead>
              <tbody id="emailLogsTable"></tbody>
            </table>
          </div>
          <div id="emailLogsPagination" class="pagination-container"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/admin.js"></script>
  <script>
    // Sidebar toggle (mobile)
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    hamburgerBtn.addEventListener('click', () => { sidebar.classList.add('sidebar-open'); overlay.classList.add('active'); document.body.style.overflow='hidden'; });
    overlay.addEventListener('click', () => { sidebar.classList.remove('sidebar-open'); overlay.classList.remove('active'); document.body.style.overflow=''; });
  </script>
</body>
</html>
