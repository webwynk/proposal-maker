<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebWynk CRM - Login</title>
  <link rel="icon" href="assets/webwynk-logo.webp">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="split-layout">
    
    <!-- Left Side: Image -->
    <div class="image-side">
      <div class="image-overlay"></div>
      
      <div class="brand-logo">
        <img src="assets/webwynk-logo.webp" alt="WebWynk Logo">
        WebWynk CRM
      </div>

      <div class="quote-container">
        <div class="quote-text">“Simply all the tools that my team and I need.”</div>
        <div class="quote-author">Karen Yue</div>
        <div class="quote-role">Director of Digital Marketing Technology</div>
      </div>
    </div>

    <!-- Right Side: Form -->
    <div class="form-side">
      <div class="form-wrapper">
        <h1 class="login-title">Welcome back to WebWynk</h1>
        <p class="login-subtitle" id="loginSubtitle">Sign in to client portal</p>

        <div class="tabs">
          <button type="button" class="tab active" id="tabClient" onclick="setRole('client')">Client</button>
          <button type="button" class="tab" id="tabAdmin" onclick="setRole('admin')">Admin</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="alex.jordan@gmail.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
            <button type="button" class="password-toggle" id="passwordToggle" onclick="togglePassword()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>

          <div class="form-options">
            <a href="#" class="forgot-password">Forgot password?</a>
            <label class="remember-me">
              Remember sign in details
              <div class="switch">
                <input type="checkbox" id="rememberMe">
                <span class="slider"></span>
              </div>
            </label>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">
            Log in
          </button>
        </form>

        <div class="divider">OR</div>

        <div class="help-text">
          For help contact: <a href="mailto:contact@webwynk.com">contact@webwynk.com</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>

</body>
</html>
