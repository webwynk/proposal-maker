<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebWynk CRM - My Invoices</title>
  <link rel="icon" href="assets/webwynk-logo.webp">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <!-- Hamburger (mobile) -->
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/webwynk-logo.webp" alt="WebWynk" class="sidebar-logo">
        <div class="sidebar-brand">          <div class="sidebar-subtitle">Client Portal</div>
        </div>
      </div>
      <div class="nav-section-label">My Account</div>
      <nav>
        <a href="client.html" class="nav-item" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span><span class="nav-tooltip">Dashboard</span>
        </a>
        <a href="client-invoices.html" class="nav-item active" data-page="invoices">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>My Invoices</span><span class="nav-tooltip">Invoices</span>
        </a>
        <a href="client-proposals.html" class="nav-item" data-page="proposals">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="M9 15l3 3 3-3"/></svg>
          <span>My Proposals</span><span class="nav-tooltip">Proposals</span>
        </a>
        <a href="client-projects.html" class="nav-item" data-page="projects">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>My Projects</span><span class="nav-tooltip">Projects</span>
        </a>
        <a href="client-settings.html" class="nav-item" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span><span class="nav-tooltip">Settings</span>
        </a>
      </nav>
      <div class="user-info">
        <div class="user-info-card">
          <div class="user-avatar" id="userAvatar">C</div>
          <div class="user-details">
            <div class="user-name" id="userName">Client</div>
            <div class="user-role" id="userCompany">Company</div>
          </div>
          <button class="logout-btn" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Out
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-invoices">
        <div class="page-header">
          <h1 class="page-title">My Invoices</h1>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Invoice #</th>
                <th>Amount</th>
                <th>Paid</th>
                <th>Balance</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="invoicesTable"></tbody>
          </table>
        </div>
        <div id="invoicesPagination" class="pagination-container"></div>
      </div>

    </main>
  </div>

  <!-- Modal moved to bottom of body -->
  <div class="modal" id="invoiceModal">
    <div class="modal-content" style="max-width:800px;">
      <div class="modal-header">
        <h2 class="modal-title">Invoice</h2>
        <button class="modal-close" onclick="closeModal('invoiceModal')">&times;</button>
      </div>
      <div class="modal-body" id="invoiceViewContent"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('invoiceModal')">Close</button>
        <button class="btn btn-primary" onclick="printInvoice()">Print</button>
      </div>
    </div>
  </div>

  <script src="js/client.js"></script>
  <script>
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    hamburgerBtn.addEventListener('click', () => { sidebar.classList.add('sidebar-open'); overlay.classList.add('active'); document.body.style.overflow='hidden'; });
    overlay.addEventListener('click', () => { sidebar.classList.remove('sidebar-open'); overlay.classList.remove('active'); document.body.style.overflow=''; });
  </script>
</body>
</html>
