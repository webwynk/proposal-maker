<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebWynk CRM - My Projects</title>
  <link rel="icon" href="assets/webwynk-logo.webp">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/webwynk-logo.webp" alt="WebWynk" class="sidebar-logo">
        <div class="sidebar-title" style="margin-top:8px;">My Account</div>
      </div>
      <nav>
        <a href="client.html" class="nav-item" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="client-invoices.html" class="nav-item" data-page="invoices">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          My Invoices
        </a>
        <a href="client-proposals.html" class="nav-item" data-page="proposals">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="M9 15l3 3 3-3"/></svg>
          My Proposals
        </a>
        <a href="client-projects.html" class="nav-item active" data-page="projects">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          My Projects
        </a>
        <a href="client-settings.html" class="nav-item" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </nav>
      <div class="user-info">
        <div class="user-name" id="userName">Client</div>
        <div class="user-role" id="userCompany">Company</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-projects">
        <div class="page-header">
          <h1 class="page-title">My Projects</h1>
        </div>
        <div id="projectsList"></div>
      </div>
    </main>
  </div>

  <!-- Modals moved to bottom of body -->
  <!-- Project Files Modal -->
  <div class="modal" id="filesModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Project Files</h2>
        <button class="modal-close" onclick="closeModal('filesModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="currentProjectFilesId">
        <div id="projectFilesTable"></div>
      </div>
    </div>
  </div>

  <!-- Project Comments Modal -->
  <div class="modal" id="commentsModal">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">Project Collaboration</h2>
        <button class="modal-close" onclick="closeModal('commentsModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="currentCommentProjectId">
        <div id="commentsList" style="max-height: 400px; overflow-y: auto; padding: 10px;"></div>
        <div class="comment-input-area">
          <textarea id="commentText" rows="2" placeholder="Add a comment or feedback..."></textarea>
          <button class="btn btn-primary btn-send-comment" onclick="postComment()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Milestone Modal -->
  <div class="modal" id="milestoneModal">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">Milestone Details</h2>
        <button class="modal-close" onclick="closeModal('milestoneModal')">&times;</button>
      </div>
      <div class="modal-body">
        <h3 id="msTitleView" style="margin-bottom:8px; font-weight: 800;"></h3>
        <p id="msDateView" style="font-size:0.85rem; color:var(--body); opacity:0.7; margin-bottom:20px;"></p>
        <div class="milestone-view-progress">
          <div class="progress-label">
            <span>Current Progress</span>
            <span class="status-badge-view" id="msStatusView">PENDING</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="msProgressFill" style="width:0%"></div>
          </div>
          <div style="font-size:1.2rem; font-weight:700; color:var(--title);" id="msProgressView"></div>
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-weight:700; font-size:0.7rem; color:var(--title); text-transform:uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px;">Phase Description</label>
            <p id="msDescView" style="font-size:0.95rem; line-height:1.6; color:var(--body);"></p>
        </div>
        <div class="milestone-action-links" style="display:flex; gap:12px; margin-top:24px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="closeModal('milestoneModal')" style="width: 100%;">Got it</button>
      </div>
    </div>
  </div>

  <script src="js/client.js"></script>
</body>
</html>
